<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗区突围无限 - 装备随机生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #e33b1a;
            --primary-red-hover: #ff4d2a;
            --primary-red-dark: #a82b12;
            --bg-dark: #0a0a0a;
            --bg-panel: #141414;
            --bg-card: #1a1a1a;
            --border-color: #2a2a2a;
            --border-red: #e33b1a40;
            --text-primary: #f0f0f0;
            --text-secondary: #888888;
            --text-muted: #555555;
            --glow-red: rgba(227, 59, 26, 0.4);
            --glow-red-strong: rgba(227, 59, 26, 0.7);
        }

        body {
            font-family: 'Rajdhani', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse at top, #1a0a0a 0%, transparent 50%),
                radial-gradient(ellipse at bottom, #0d0d0d 0%, transparent 50%),
                linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(227, 59, 26, 0.02) 1px,
                    rgba(227, 59, 26, 0.02) 2px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(227, 59, 26, 0.02) 1px,
                    rgba(227, 59, 26, 0.02) 2px
                );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-family: 'Black Ops One', 'Microsoft YaHei', sans-serif;
            font-size: 3rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-shadow:
                0 0 10px var(--glow-red),
                0 0 20px var(--glow-red),
                0 0 40px var(--glow-red-strong);
            position: relative;
            display: inline-block;
            width: 100%;
        }

        h1::before, h1::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-red), transparent);
        }

        h1::before {
            left: -120px;
        }

        h1::after {
            right: -120px;
        }

        .subtitle {
            text-align: center;
            color: var(--primary-red);
            margin-bottom: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* 模式选择 */
        .mode-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9), rgba(20, 20, 20, 0.95));
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 18px 35px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            min-width: 200px;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(227, 59, 26, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .mode-btn:hover::before {
            left: 100%;
        }

        .mode-btn:hover {
            border-color: var(--primary-red);
            color: var(--text-primary);
            box-shadow: 0 0 20px var(--glow-red);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: linear-gradient(145deg, rgba(227, 59, 26, 0.2), rgba(168, 43, 18, 0.3));
            border-color: var(--primary-red);
            color: var(--text-primary);
            box-shadow: 0 0 30px var(--glow-red);
        }

        .mode-btn .price-range {
            display: block;
            font-size: 0.75rem;
            margin-top: 6px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mode-btn.active .price-range {
            color: var(--primary-red);
        }

        /* 主要内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 面板 */
        .panel {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9), rgba(20, 20, 20, 0.95));
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-red), transparent);
            opacity: 0.5;
        }

        .panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-red), transparent);
            opacity: 0.5;
        }

        .panel-title {
            font-family: 'Black Ops One', 'Microsoft YaHei', sans-serif;
            font-size: 1.1rem;
            color: var(--primary-red);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, var(--primary-red), var(--primary-red-dark));
            border-radius: 2px;
            box-shadow: 0 0 10px var(--glow-red);
        }

        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }

        /* 装备类别 */
        .equipment-category {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border-left: 3px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .equipment-category.enabled {
            border-left-color: var(--primary-red);
            background: rgba(227, 59, 26, 0.05);
        }

        .equipment-category.disabled {
            opacity: 0.4;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .category-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--primary-red);
        }

        .category-name {
            flex: 1;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .category-type {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 3px 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2px;
            border: 1px solid var(--border-color);
            letter-spacing: 1px;
        }

        .category-content {
            padding-left: 32px;
        }

        .selection-modes {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .selection-mode {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .selection-mode:hover {
            background: rgba(227, 59, 26, 0.1);
            border-color: var(--primary-red);
        }

        .selection-mode.active {
            background: rgba(227, 59, 26, 0.2);
            border-color: var(--primary-red);
            color: var(--primary-red);
            box-shadow: 0 0 10px var(--glow-red);
        }

        .equipment-select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Rajdhani', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .equipment-select:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 15px var(--glow-red);
        }

        .equipment-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .equipment-select option {
            background: #0a0a0a;
            color: var(--text-primary);
        }

        /* 互斥选择 */
        .exclusive-choice {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .exclusive-option {
            flex: 1;
            min-width: 140px;
        }

        .exclusive-option label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .exclusive-option label:hover {
            border-color: var(--primary-red);
            background: rgba(227, 59, 26, 0.05);
        }

        .exclusive-option input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--primary-red);
        }

        .exclusive-option input[type="radio"]:checked + span {
            color: var(--primary-red);
        }

        .exclusive-option input[type="radio"]:checked ~ label {
            border-color: var(--primary-red);
            background: rgba(227, 59, 26, 0.1);
            box-shadow: 0 0 10px var(--glow-red);
        }

        /* 生成按钮 */
        .generate-section {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .generate-btn {
            background: linear-gradient(145deg, var(--primary-red), var(--primary-red-dark));
            border: none;
            color: #fff;
            padding: 20px 60px;
            border-radius: 4px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Black Ops One', 'Microsoft YaHei', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px var(--glow-red);
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .generate-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .generate-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px var(--glow-red-strong);
            background: linear-gradient(145deg, var(--primary-red-hover), var(--primary-red));
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        /* 结果展示 */
        .result-section {
            margin-top: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .result-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 30%;
            height: 2px;
            background: var(--primary-red);
            box-shadow: 0 0 10px var(--glow-red);
        }

        .total-price {
            font-size: 1.5rem;
            color: var(--primary-red);
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
        }

        .total-price span {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .equipment-grid {
            display: grid;
            gap: 15px;
        }

        .equipment-card {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9), rgba(20, 20, 20, 0.95));
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideIn 0.5s ease forwards;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .equipment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-red), var(--primary-red-dark));
        }

        .equipment-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(227, 59, 26, 0.05), transparent);
            transition: width 0.3s ease;
        }

        .equipment-card:hover::after {
            width: 100%;
        }

        .equipment-card:hover {
            border-color: var(--primary-red);
            box-shadow: 0 6px 25px var(--glow-red);
            transform: translateX(5px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card-name {
            font-size: 1.05rem;
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
        }

        .card-price {
            text-align: right;
        }

        .card-price .price {
            font-size: 1.15rem;
            color: var(--primary-red);
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
        }

        .card-price .level {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 警告信息 */
        .warning-banner {
            background: linear-gradient(145deg, rgba(138, 74, 58, 0.3), rgba(122, 58, 42, 0.4));
            border: 1px solid rgba(227, 59, 26, 0.5);
            border-radius: 4px;
            padding: 15px 20px;
            margin: 15px 0;
            color: var(--text-primary);
            display: none;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .warning-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #ff6a6a, var(--primary-red));
        }

        .warning-banner.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .warning-banner .warning-icon {
            display: inline-block;
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .warning-banner .warning-text {
            display: inline;
            vertical-align: middle;
        }

        /* 冲突提示 */
        .conflict-warning {
            color: #ff6a6a;
            font-size: 0.8rem;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255, 106, 106, 0.08);
            border-left: 2px solid #ff6a6a;
            border-radius: 2px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            h1::before, h1::after {
                display: none;
            }

            .mode-section {
                gap: 10px;
            }

            .mode-btn {
                min-width: 140px;
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .panel {
                padding: 15px;
            }

            .generate-btn {
                padding: 15px 40px;
                font-size: 1.1rem;
            }

            .equipment-card {
                padding: 12px 15px;
            }

            .card-name {
                font-size: 0.95rem;
            }

            .card-price .price {
                font-size: 1rem;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-red-dark), var(--primary-red));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--primary-red), var(--primary-red-hover));
            box-shadow: 0 0 10px var(--glow-red);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 装饰性元素 - 角标 */
        .corner-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-red);
            opacity: 0.5;
            pointer-events: none;
        }

        .corner-decoration.top-left {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.top-right {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-left {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
        }

        .corner-decoration.bottom-right {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        /* 斜向分割线装饰 */
        .diagonal-divider {
            position: relative;
            overflow: hidden;
        }

        .diagonal-divider::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-red), transparent);
            transform: rotate(-30deg);
            opacity: 0.3;
        }

        /* 等级标签样式 */
        .level-badge {
            display: inline-block;
            padding: 2px 8px;
            background: linear-gradient(145deg, var(--primary-red), var(--primary-red-dark));
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 2px;
            letter-spacing: 1px;
            box-shadow: 0 0 8px var(--glow-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="diagonal-divider"></div>
        <h1>暗区突围无限</h1>
        <p class="subtitle">AQTWWX Equipment Random Generator</p>
        <div class="diagonal-divider"></div>

        <!-- 模式选择 -->
        <div class="mode-section">
            <div class="mode-btn" data-mode="normal">
                普通模式
                <span class="price-range">&lt; 450,000</span>
            </div>
            <div class="mode-btn active" data-mode="blockade">
                封锁模式
                <span class="price-range">150,000 - 1,000,000</span>
            </div>
            <div class="mode-btn" data-mode="enhanced">
                强化封锁模式
                <span class="price-range">&ge; 450,000</span>
            </div>
        </div>

        <!-- 警告横幅 -->
        <div class="warning-banner" id="warningBanner">
            <span class="warning-icon">⚠️</span>
            <span class="warning-text" id="warningText"></span>
        </div>

        <!-- 生成按钮 -->
        <div class="generate-section">
            <button class="generate-btn" id="generateBtn">随机生成</button>
        </div>

        <div class="main-content">
            <!-- 设置面板 -->
            <div class="panel">
                <div class="corner-decoration top-left"></div>
                <div class="corner-decoration top-right"></div>
                <div class="corner-decoration bottom-left"></div>
                <div class="corner-decoration bottom-right"></div>
                <h2 class="panel-title">装备设置</h2>

                <!-- 防弹衣/弹挂 -->
                <div class="equipment-category" data-category="body">
                    <div class="category-header">

        function updateBodySelect() {

            if (bodyType === 'armored') {

        // ==================== 事件监听 ====================
        // 模式选择
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {

                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                hideWarning();
            });
        });

        // 身体类型切换
        categories.body.armoredRadio.addEventListener('change', () => {

                bodyType = 'armored';

            if (categories.body.separateRadio.checked) {
                bodyType = 'separate';

        // 装备类别切换
        Object.keys(categories).forEach(categoryName => {
            const cat = categories[categoryName];

            // 启用/禁用切换
            cat.toggle.addEventListener('change', () => {
                settings[categoryName].enabled = cat.toggle.checked;

                const categoryEl = document.querySelector(`[data-category="${categoryName}"]`);
                if (cat.toggle.checked) {
                    categoryEl.classList.add('enabled');
                    categoryEl.classList.remove('disabled');
                } else {
                    categoryEl.classList.remove('enabled');
                    categoryEl.classList.add('disabled');
                }

                updateCategoryState(categoryName);
                checkConflicts();
            });

            // 随机/指定切换
            if (cat.modes) {
                const modeBtns = cat.modes.querySelectorAll('.selection-mode');
                modeBtns.forEach(modeBtn => {
                    modeBtn.addEventListener('click', () => {
                        modeBtns.forEach(b => b.classList.remove('active'));
                        modeBtn.classList.add('active');
                        settings[categoryName].mode = modeBtn.dataset.mode;
                        updateCategoryState(categoryName);

                        // 检查冲突并恢复被禁用的选项
                        checkConflicts();

                        // 如果是头盔模式改变，恢复耳机的可用状态
                        if (categoryName === 'helmet') {
                            if (categories.ear.toggle && categories.ear.toggle.disabled) {
                                categories.ear.toggle.disabled = false;
                            }
                        }
                    });
                });
            }

            // 指定装备选择
            if (cat.select) {
                cat.select.addEventListener('change', () => {
                    settings[categoryName].specified = cat.select.value;
                    checkConflicts();

                    // 如果是头盔选择改变，恢复耳机的可用状态
                    if (categoryName === 'helmet') {
                        if (categories.ear.toggle && categories.ear.toggle.disabled) {
                            categories.ear.toggle.disabled = false;
                        }
                    }
                });
            }
        });

        // 更新类别状态
        function updateCategoryState(categoryName) {
            const cat = categories[categoryName];
            const setting = settings[categoryName];

            if (!cat.select) return;

            if (setting.enabled && setting.mode === 'specified') {
                cat.select.disabled = false;
            } else {
                cat.select.disabled = true;
                cat.select.value = '';
                setting.specified = null;
            }
        }

        // 检查冲突
        function checkConflicts() {
            let warnings = [];

            // 1. 检查头盔与耳机的冲突
            if (settings.helmet.enabled && settings.ear.enabled && settings.helmet.specified) {
                const helmetName = settings.helmet.specified;
                if (sealed_helmet_names.has(helmetName)) {
                    warnings.push(`${helmetName}与耳机冲突，请重新选择`);
                }
            }

            // 2. 检查头盔与面罩的冲突
            if (settings.helmet.enabled && settings.faceShield.enabled &&
                settings.helmet.specified && settings.faceShield.specified) {
                const helmetName = settings.helmet.specified;
                const faceShieldName = settings.faceShield.specified;
                const helmet = helmets.find(h => h.name === helmetName);

                if (helmet && !helmet.available_face_shields.includes(faceShieldName)) {
                    warnings.push(`${helmetName}与${faceShieldName}不匹配，请重新选择`);
                }
            }

            // 3. 检查防毒面具的冲突
            if (settings.gasMask.enabled) {
                // 防毒面具与面罩冲突
                if (settings.faceShield.enabled) {
                    const faceShieldName = settings.faceShield.specified || "面罩";
                    warnings.push(`防毒面具与${faceShieldName}冲突，请重新选择`);
                }

                // 防毒面具与头盔冲突
                if (settings.helmet.enabled && settings.helmet.specified) {
                    const helmetName = settings.helmet.specified;
                    if (gas_mask_conflict_helmets.has(helmetName)) {
                        warnings.push(`${helmetName}与防毒面具冲突，请重新选择`);
                    }
                }
            }

            // 显示警告
            if (warnings.length > 0) {
                showWarning(warnings.join('；'));
            } else {
                hideWarning();
            }
        }

        // 显示警告
        function showWarning(message) {
            warningText.textContent = message;
            warningBanner.classList.add('show');
        }

        // 隐藏警告
        function hideWarning() {
            warningBanner.classList.remove('show');
        }

        // ==================== 随机生成 ====================
        generateBtn.addEventListener('click', generateEquipment);

        function generateEquipment() {
            hideWarning();

            // 检查冲突
            if (warningBanner.classList.contains('show')) {
                showWarning("装备搭配冲突，请重新选择");
                return;
            }

            const results = [];
            let totalPrice = 0;
            let attempts = 0;
            const maxAttempts = 50;

            while (attempts < maxAttempts) {
                results.length = 0;
                totalPrice = 0;

                // 生成装备
                const generated = generateSingleAttempt();

                if (!generated) {
                    // 冲突导致的失败
                    attempts++;
                    continue;
                }

                generated.forEach(item => {
                    results.push(item);
                    totalPrice += item.price;
                });

                // 检查价格区间
                const inRange = checkPriceRange(totalPrice);

                if (inRange) {
                    break;
                }

                attempts++;
            }

            if (attempts >= maxAttempts) {
                showWarning("战备值错误，请重新选择");
                return;
            }

            // 显示结果
            displayResults(results, totalPrice);
        }

        function generateSingleAttempt() {
            const results = [];

            // 检查指定装备的冲突
            if (settings.helmet.enabled && settings.helmet.specified &&
                settings.ear.enabled && settings.ear.specified) {
                const helmetName = settings.helmet.specified;
                if (sealed_helmet_names.has(helmetName)) {
                    return null; // 头盔与耳机冲突
                }
            }

            if (settings.helmet.enabled && settings.helmet.specified &&
                settings.faceShield.enabled && settings.faceShield.specified) {
                const helmetName = settings.helmet.specified;
                const faceShieldName = settings.faceShield.specified;
                const helmet = helmets.find(h => h.name === helmetName);

                if (helmet && !helmet.available_face_shields.includes(faceShieldName)) {
                    return null; // 头盔与面罩不匹配
                }
            }

            if (settings.gasMask.enabled) {
                if (settings.faceShield.enabled) {
                    return null; // 防毒面具与面罩冲突
                }

                if (settings.helmet.enabled && settings.helmet.specified) {
                    const helmetName = settings.helmet.specified;
                    if (gas_mask_conflict_helmets.has(helmetName)) {
                        return null; // 头盔与防毒面具冲突
                    }
                }
            }

            // 身体部位
            if (settings.body.enabled) {
                if (bodyType === 'armored') {
                    // 有甲弹挂
                    if (settings.body.mode === 'random') {
                        const rig = getRandomItem(armored_chest_rigs);
                        results.push({ ...rig, category: '有甲弹挂' });
                    } else if (settings.body.specified) {
                        const rig = armored_chest_rigs.find(r => r.name === settings.body.specified);
                        if (rig) {
                            results.push({ ...rig, category: '有甲弹挂' });
                        }
                    }
                } else {
                    // 护甲 + 无甲弹挂
                    if (settings.body.mode === 'random') {
                        const armor = getRandomItem(armors);
                        results.push({ ...armor, category: '防弹衣' });
                        const rig = getRandomItem(chest_rigs_no_armor);
                        results.push({ ...rig, category: '弹挂' });
                    } else if (settings.body.specified) {
                        const val = settings.body.specified;
                        if (val.startsWith('armor:')) {
                            const armorName = val.substring(6);
                            const armor = armors.find(a => a.name === armorName);
                            if (armor) {
                                results.push({ ...armor, category: '防弹衣' });
                            }
                            const rig = getRandomItem(chest_rigs_no_armor);
                            results.push({ ...rig, category: '弹挂' });
                        } else if (val.startsWith('rig:')) {
                            const rigName = val.substring(4);
                            const rig = chest_rigs_no_armor.find(r => r.name === rigName);
                            if (rig) {
                                results.push({ ...rig, category: '弹挂' });
                            }
                            const armor = getRandomItem(armors);
                            results.push({ ...armor, category: '防弹衣' });
                        }
                    }
                }
            }

            // 头盔
            let selectedHelmet = null;
            if (settings.helmet.enabled) {
                if (settings.helmet.mode === 'random') {
                    selectedHelmet = getRandomItem(helmets);
                } else if (settings.helmet.specified) {
                    selectedHelmet = helmets.find(h => h.name === settings.helmet.specified);
                }
                if (selectedHelmet) {
                    results.push({ ...selectedHelmet, category: '头盔' });
                }
            }

            // 面罩
            let selectedFaceShield = null;
            if (settings.faceShield.enabled) {
                if (settings.faceShield.mode === 'random') {
                    selectedFaceShield = getRandomItem(face_shields);
                } else if (settings.faceShield.specified) {
                    selectedFaceShield = face_shields.find(f => f.name === settings.faceShield.specified);
                }
                if (selectedFaceShield) {
                    results.push({ ...selectedFaceShield, category: '面罩' });
                }
            }

            // 背包
            if (settings.backpack.enabled) {
                if (settings.backpack.mode === 'random') {
                    const item = getRandomItem(backpacks);
                    results.push({ ...item, category: '背包' });
                } else if (settings.backpack.specified) {
                    const item = backpacks.find(b => b.name === settings.backpack.specified);
                    if (item) {
                        results.push({ ...item, category: '背包' });
                    }
                }
            }

            // 耳机（检查自闭头冲突）
            if (settings.ear.enabled) {
                const canUseEar = !selectedHelmet || selectedHelmet.type !== '自闭头';
                if (canUseEar) {
                    if (settings.ear.mode === 'random') {
                        const item = getRandomItem(ears);
                        results.push({ ...item, category: '耳机' });
                    } else if (settings.ear.specified) {
                        const item = ears.find(e => e.name === settings.ear.specified);
                        if (item) {
                            results.push({ ...item, category: '耳机' });
                        }
                    }
                }
            }

            // 防毒面具（检查面罩和冲突头盔）
            let canUseGasMask = true;
            if (selectedFaceShield) {
                canUseGasMask = false;
            }
            if (selectedHelmet && gas_mask_conflict_helmets.has(selectedHelmet.name)) {
                canUseGasMask = false;
            }

            if (settings.gasMask.enabled && canUseGasMask) {
                if (settings.gasMask.mode === 'random') {
                    const item = getRandomItem(gas_masks);
                    results.push({ ...item, category: '防毒面具' });
                } else if (settings.gasMask.specified) {
                    const item = gas_masks.find(g => g.name === settings.gasMask.specified);
                    if (item) {
                        results.push({ ...item, category: '防毒面具' });
                    }
                }
            }

            // 枪械
            if (settings.weapon.enabled) {
                if (settings.weapon.mode === 'random') {
                    const item = getRandomItem(weapons);
                    results.push({ ...item, category: '枪械' });
                } else if (settings.weapon.specified) {
                    const item = weapons.find(w => w.name === settings.weapon.specified);
                    if (item) {
                        results.push({ ...item, category: '枪械' });
                    }
                }
            }

            // 检查头盔和面罩兼容性
            if (selectedHelmet && selectedFaceShield) {
                if (!selectedHelmet.available_face_shields.includes(selectedFaceShield.name)) {
                    // 不兼容时移除面罩，保留头盔
                    results = results.filter(item => !(item.category === '面罩' && item.name === selectedFaceShield.name));
                }
            }

            return results;
        }

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function checkPriceRange(price) {
            switch (currentMode) {
                case 'normal':
                    return price < 450000;
                case 'blockade':
                    return price >= 150000 && price <= 1000000;
                case 'enhanced':
                    return price >= 450000;
                default:
                    return true;
            }
        }

        function displayResults(results, totalPrice) {
            // 更新总价格
            totalPriceEl.textContent = '¥' + totalPrice.toLocaleString();

            // 清空结果区域
            equipmentGrid.innerHTML = '';

            // 添加装备卡片
            results.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'equipment-card';
                card.style.animationDelay = `${index * 0.1}s`;

                const levelBadge = item.level !== undefined
                    ? `<span class="level-badge">LV${item.level}</span>`
                    : '';

                card.innerHTML = `
                    <div>
                        <div class="card-label">${item.category}</div>
                        <div class="card-name">${item.name}</div>
                    </div>
                    <div class="card-price">
                        ${levelBadge}
                        <div class="price">¥${item.price.toLocaleString()}</div>
                    </div>
                `;

                equipmentGrid.appendChild(card);
            });
        }

        // ==================== 初始化 ====================
        function init() {
            initSelects();
            updateBodySelect();

            // 设置默认选中
            categories.body.separateRadio.checked = true;
        }

        init();
    </script>
</body>
</html>
